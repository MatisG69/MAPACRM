name: Sync Hostinger emails (manuel)

# Le cron récurrent est désormais géré par pg_cron + pg_net côté Supabase
# (granularité 1 min). Ce workflow est conservé uniquement comme bouton
# « Run workflow » dans l'onglet GitHub Actions, pour forcer une sync
# instantanée en cas de besoin (debug, mail urgent, etc.).

on:
  workflow_dispatch:

concurrency:
  group: sync-emails
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Hit Vercel sync endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${CRON_SECRET}" ]; then
            echo "::error::CRON_SECRET non configuré dans les secrets GitHub Actions"
            exit 1
          fi

          response=$(curl -sS -w "\n%{http_code}" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "Accept: application/json" \
            --max-time 240 \
            "https://mapacrm.vercel.app/api/cron/sync-emails")

          body=$(echo "$response" | head -n -1)
          status=$(echo "$response" | tail -n 1)

          echo "Status HTTP : $status"
          echo "Body : $body"

          if [ "$status" != "200" ]; then
            echo "::error::Sync failed (HTTP $status)"
            exit 1
          fi
